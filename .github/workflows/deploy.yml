name: Deploy to Vercel

on:
  push:
    branches: [main, staging]

jobs:
  deploy-app:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_7cBA70ABi7r0BNsljeJfvQ3y
      VERCEL_PROJECT_ID: prj_toTfkIDiZvYieHem9QvyVscZt40F
    steps:
      - uses: actions/checkout@v4
      - run: npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_7cBA70ABi7r0BNsljeJfvQ3y
      VERCEL_PROJECT_ID: prj_toTfkIDiZvYieHem9QvyVscZt40F
    steps:
      - uses: actions/checkout@v4
      # Preview deployment (no --prod), pointed at the Neon `staging` branch instead of
      # production — DATABASE_URL is injected at runtime for just this deployment via -e.
      # Turnstile uses Cloudflare's official public "always passes" test keys (not real
      # secrets, safe to hardcode) instead of production's real keys, since Turnstile
      # sitekeys are domain-restricted and production's likely doesn't allow this host;
      # the test keys also let QA submit Public Forms without solving a real captcha.
      # SMTP intentionally reuses production's ZOHO_SMTP_USER/PASSWORD (same domain, no
      # domain-restriction issue) — those must be enabled for the "Preview" scope in the
      # Vercel dashboard's project env vars for this to actually send; if they're not,
      # email sending no-ops safely (same best-effort pattern as src/lib/mailer.ts)
      # instead of breaking the deploy.
      - name: Deploy and alias to staging.joinnorthstack.com
        run: |
          # `domains add` is idempotent-ish for our purposes: it errors if the domain is
          # already on the project, which we ignore — it's just a one-time registration,
          # done here via CLI instead of the dashboard's "Add Domains" flow because that
          # flow's "Connect to an environment" option requires linking the Vercel project
          # to the GitHub repo natively, which this project deliberately does not use
          # (see the deploy-app job above — CLI + token, not native Git integration).
          npx vercel domains add staging.joinnorthstack.com --token="$VERCEL_TOKEN" || true
          DEPLOY_URL=$(npx vercel deploy --token="$VERCEL_TOKEN" --yes \
            -e DATABASE_URL="$STAGING_DATABASE_URL" \
            -e TURNSTILE_SECRET_KEY="$TURNSTILE_TEST_SECRET_KEY" \
            --build-env VITE_TURNSTILE_SITE_KEY="$TURNSTILE_TEST_SITE_KEY")
          echo "Deployed to: $DEPLOY_URL"
          npx vercel alias set "$DEPLOY_URL" staging.joinnorthstack.com --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          # Cloudflare's official, publicly documented Turnstile testing keys ("always
          # passes") -- not secrets, safe to commit. Verify against
          # developers.cloudflare.com/turnstile/troubleshooting/testing/ if they ever
          # stop working.
          TURNSTILE_TEST_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_TEST_SECRET_KEY: 1x0000000000000000000000000000000AA
