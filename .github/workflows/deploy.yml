name: Deploy to Vercel

on:
  push:
    branches: [main, staging]

jobs:
  deploy-app:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_7cBA70ABi7r0BNsljeJfvQ3y
      VERCEL_PROJECT_ID: prj_toTfkIDiZvYieHem9QvyVscZt40F
    steps:
      - uses: actions/checkout@v4
      - run: npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_7cBA70ABi7r0BNsljeJfvQ3y
      VERCEL_PROJECT_ID: prj_toTfkIDiZvYieHem9QvyVscZt40F
    steps:
      - uses: actions/checkout@v4
      # Preview deployment (no --prod), pointed at the Neon `staging` branch instead of
      # production — DATABASE_URL is injected at runtime for just this deployment via -e,
      # not set as a persistent Vercel project env var. Other secrets (SMTP, Turnstile,
      # APP_BASE_URL) are not overridden here; if they're not already configured as
      # "Preview"-scoped vars in the Vercel dashboard, those features no-op safely on
      # staging (same best-effort pattern already used in src/lib/mailer.ts) instead of
      # breaking the deploy.
      - name: Deploy and alias to staging.joinnorthstack.com
        run: |
          # `domains add` is idempotent-ish for our purposes: it errors if the domain is
          # already on the project, which we ignore — it's just a one-time registration,
          # done here via CLI instead of the dashboard's "Add Domains" flow because that
          # flow's "Connect to an environment" option requires linking the Vercel project
          # to the GitHub repo natively, which this project deliberately does not use
          # (see the deploy-app job above — CLI + token, not native Git integration).
          npx vercel domains add staging.joinnorthstack.com --token="$VERCEL_TOKEN" || true
          DEPLOY_URL=$(npx vercel deploy --token="$VERCEL_TOKEN" --yes -e DATABASE_URL="$STAGING_DATABASE_URL")
          echo "Deployed to: $DEPLOY_URL"
          npx vercel alias set "$DEPLOY_URL" staging.joinnorthstack.com --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
